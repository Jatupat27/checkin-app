<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
  font-family:sans-serif;
  padding:20px;
}
table {
  width:100%;
  border-collapse:collapse;
}
th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}
th {
  background:#eee;
}
</style>
</head>

<body>

<h2>📊 รายชื่อผู้เช็คชื่อ</h2>

<table id="table">
<tr>
  <th>รหัส</th>
  <th>ชื่อ</th>
  <th>เวลา</th>
</tr>
</table>

<script>
fetch("https://script.google.com/macros/s/AKfycbwi1TNFzkm2DwTsAwOUIivv9mvqEDUO0ctxckgfmjw3uJWhuLYhVXn62VwLXvm_AgBH2A/exec")
.then(res => res.json())
.then(data => {
  let table = document.getElementById("table");

  for(let i = 1; i < data.length; i++){
    let row = table.insertRow();

    for(let j = 0; j < data[i].length; j++){
      let cell = row.insertCell();
      cell.innerText = data[i][j];
    }
  }
})
.catch(() => {
  document.body.innerHTML += "<p>❌ โหลดข้อมูลไม่ได้</p>";
});
</script>

</body>
</html>
