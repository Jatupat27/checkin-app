<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Kanit', sans-serif;
  margin:0;
  background:#f4f6fb;
}

.header {
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  padding:20px;
  text-align:center;
  font-size:20px;
}

.container {
  padding:20px;
}

table {
  width:100%;
  border-collapse:collapse;
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

th {
  background:#667eea;
  color:white;
  padding:10px;
}

td {
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:center;
}

tr:hover {
  background:#f1f1f1;
}
</style>
</head>

<body>

<div class="header">
📊 รายชื่อผู้เช็คชื่อ
</div>

<div class="container">
<table id="table">
<tr>
  <th>รหัส</th>
  <th>ชื่อ</th>
  <th>เวลา</th>
</tr>
</table>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxDDCxiSmywAi0kRNAGmN0vq2WWbLWzwHZO-VfchaGZeYbsGXeWIZc3SUJlbzdNsn1s-w/exec";

fetch(API_URL)
.then(res => res.text()) // 🔥 แก้มือถือ
.then(text => {
  let data = JSON.parse(text);

  let table = document.getElementById("table");

  for(let i = 1; i < data.length; i++){
    let row = table.insertRow();

    let idCell = row.insertCell(0);
    let nameCell = row.insertCell(1);
    let timeCell = row.insertCell(2);

    idCell.innerText = data[i][0] || "-";
    nameCell.innerText = data[i][1] || "-";
    timeCell.innerText = data[i][2] || "-";
  }

  if(data.length <= 1){
    let row = table.insertRow();
    let cell = row.insertCell(0);
    cell.colSpan = 3;
    cell.innerText = "⚠️ ยังไม่มีข้อมูล";
  }
})
.catch(err => {
  console.log(err);
  alert("โหลดข้อมูลไม่ได้ ❌");
});
</script>

</body>
</html>
