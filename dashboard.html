<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<style>
body {
  font-family: sans-serif;
  background: #f5f7fb;
}
.container {
  width: 90%;
  margin: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}
th, td {
  padding: 10px;
  border: 1px solid #ddd;
}
th {
  background: #4CAF50;
  color: white;
}
</style>
</head>

<body>

<div class="container">
  <h2>📋 รายชื่อผู้เช็คชื่อ</h2>

  <table id="table">
    <tr>
      <th>รหัส</th>
      <th>ชื่อ</th>
      <th>เวลา</th>
    </tr>
  </table>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxDDCxiSmywAi0kRNAGmN0vq2WWbLWzwHZO-VfchaGZeYbsGXeWIZc3SUJlbzdNsn1s-w/exec";

fetch(API_URL)
  .then(res => res.text())
  .then(text => {
    let data = JSON.parse(text);

    let table = document.getElementById("table");

    for (let i = 1; i < data.length; i++) {
      let row = table.insertRow();

      row.insertCell(0).innerText = data[i][0] || "-";
      row.insertCell(1).innerText = data[i][1] || "-";
      row.insertCell(2).innerText = data[i][2] || "-";
    }
  })
  .catch(err => {
    alert("❌ โหลดข้อมูลไม่ได้");
  });
</script>

</body>
</html>
