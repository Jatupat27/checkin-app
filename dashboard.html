<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
  font-family:sans-serif;
  padding:20px;
}
table {
  width:100%;
  border-collapse:collapse;
}
th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}
th {
  background:#eee;
}
</style>
</head>

<body>

<h2>📊 รายชื่อผู้เช็คชื่อ</h2>

<table id="table">
<tr>
  <th>รหัส</th>
  <th>ชื่อ</th>
  <th>เวลา</th>
</tr>
</table>

<p id="error" style="color:red;"></p>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5XfG_2yi9Vs_j73SdmKPJsU0WV-YxuHREoYlH8aj0fGnCJrZeoTj1n6VZjSrOor62yw/exec";

fetch(API_URL)
.then(res => res.text()) // 🔥 แก้มือถือ
.then(text => {
  let data = JSON.parse(text);

  let table = document.getElementById("table");

  for(let i = 1; i < data.length; i++){
    let row = table.insertRow();

    for(let j = 0; j < data[i].length; j++){
      let cell = row.insertCell();
      cell.innerText = data[i][j];
    }
  }

  if(data.length <= 1){
    document.getElementById("error").innerText = "⚠️ ยังไม่มีข้อมูล";
  }
})
.catch(err => {
  console.log(err);
  document.getElementById("error").innerText = "❌ โหลดข้อมูลไม่ได้";
});
</script>

</body>
</html>
