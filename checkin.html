<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>เช็คชื่อ</title>
<style>
body {
  font-family: sans-serif;
  background: #f5f7fb;
  text-align: center;
}
.card {
  background: white;
  padding: 20px;
  margin: 50px auto;
  width: 300px;
  border-radius: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}
input {
  width: 90%;
  padding: 10px;
  margin: 10px;
}
button {
  padding: 10px 20px;
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="card">
  <h2>เช็คชื่อ</h2>

  <input id="studentId" placeholder="รหัสนักศึกษา">
  <input id="name" placeholder="ชื่อ-นามสกุล">

  <button onclick="sendData()">เช็คชื่อ</button>

  <p id="msg"></p>

  <a href="dashboard.html">📊 ดูรายชื่อ</a>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxDDCxiSmywAi0kRNAGmN0vq2WWbLWzwHZO-VfchaGZeYbsGXeWIZc3SUJlbzdNsn1s-w/exec";

function sendData() {
  let studentId = document.getElementById("studentId").value.trim();
  let name = document.getElementById("name").value.trim();
  let msg = document.getElementById("msg");

  if (!studentId || !name) {
    msg.innerText = "❌ กรอกข้อมูลให้ครบ";
    msg.style.color = "red";
    return;
  }

  fetch(API_URL, {
    method: "POST",
    body: new URLSearchParams({
      studentId: studentId,
      name: name
    })
  })
  .then(res => res.json())
  .then(data => {
    msg.innerText = "✅ เช็คชื่อสำเร็จ";
    msg.style.color = "green";
  })
  .catch(err => {
    msg.innerText = "❌ ส่งข้อมูลไม่สำเร็จ";
    msg.style.color = "red";
  });
}
</script>

</body>
</html>
