<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Check-in</title>

<style>
body {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:linear-gradient(135deg,#6a11cb,#2575fc);
  color:white;
  font-family:sans-serif;
}
.card {
  background:rgba(255,255,255,0.1);
  padding:30px;
  border-radius:20px;
  width:300px;
  text-align:center;
}
input, button {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}
button {
  background:white;
  color:#2575fc;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="card">
  <h2>📌 เช็คชื่อ</h2>

  <input id="studentId" placeholder="รหัสนักศึกษา">
  <input id="name" placeholder="ชื่อ">

  <button onclick="sendData()">เช็คชื่อ</button>

  <p id="msg"></p>

  <br>
  <a href="dashboard.html" style="color:white;">📊 ดูรายชื่อ</a>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbw4BUv-XSxjgzfhPP2xZzhxy57XPQLklybRzmvozX5dKEmflEneUvDC0IXajI3imEDEFA/exec";

function sendData(){
  let studentId = document.getElementById("studentId").value.trim();
  let name = document.getElementById("name").value.trim();

  if(!studentId || !name){
    document.getElementById("msg").innerText = "❌ กรอกให้ครบ";
    return;
  }

  fetch(API_URL, {
    method: "POST",
    body: new URLSearchParams({
      studentId: studentId,
      name: name
    })
  })
  .then(res => res.text())
  .then(() => {
    document.getElementById("msg").innerText = "✅ เช็คชื่อสำเร็จ";
  })
  .catch(() => {
    document.getElementById("msg").innerText = "❌ Error";
  });
}
</script>

</body>
</html>
