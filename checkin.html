<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบเช็คชื่อ</title>

<style>
body {
  margin: 0;
  font-family: 'Prompt', sans-serif;
  background: linear-gradient(120deg, #667eea, #764ba2);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* กล่อง */
.card {
  background: rgba(255,255,255,0.95);
  padding: 35px;
  border-radius: 25px;
  width: 90%;
  max-width: 420px;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
}

/* หัวข้อ */
h1 {
  margin-bottom: 20px;
  color: #333;
}

/* input */
input {
  width: 100%;
  padding: 15px;
  margin: 12px 0;
  border-radius: 12px;
  border: none;
  background: #f1f3f6;
  font-size: 16px;
  outline: none;
  transition: 0.2s;
}

input:focus {
  background: #e0e7ff;
  transform: scale(1.02);
}

/* ปุ่ม */
button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(45deg, #ff6a00, #ee0979);
  color: white;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* ลิงก์ */
.link {
  margin-top: 20px;
  display: block;
  color: #764ba2;
  text-decoration: none;
  font-weight: bold;
}

/* ไอคอน */
.icon {
  font-size: 50px;
  margin-bottom: 10px;
}
</style>

</head>

<body>

<div class="card">
  <div class="icon">🎓</div>
  <h1>เช็คชื่อเข้าเรียน</h1>

  <input type="text" id="studentId" placeholder="📌 รหัสนักศึกษา">
  <input type="text" id="name" placeholder="👤 ชื่อ-นามสกุล">

  <button onclick="submitData()">🚀 เช็คชื่อ</button>

  <a href="dashboard.html" class="link">📊 ดูรายชื่อทั้งหมด</a>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwRPwHcOpuaMzSFQWuNM_7aR-7reHXGqQLTqG08Mkuq4EiWmh71COPh73itmsmqNT8-AQ/exec";

function submitData() {
  const id = document.getElementById("studentId").value;
  const name = document.getElementById("name").value;

  if (!id || !name) {
    alert("⚠️ กรุณากรอกข้อมูลให้ครบ");
    return;
  }

  fetch(API_URL, {
    method: "POST",
    body: new URLSearchParams({
      studentId: id,
      name: name
    })
  })
  .then(res => res.json())
  .then(() => {
    alert("✅ เช็คชื่อสำเร็จ!");
  })
  .catch(() => {
    alert("❌ เกิดข้อผิดพลาด");
  });
}
</script>

</body>
</html>
