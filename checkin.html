<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Check-in</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Kanit', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:white;
  padding:30px;
  border-radius:20px;
  width:320px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  text-align:center;
}

h2 {
  margin-bottom:20px;
}

input {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ddd;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#msg {
  margin-top:10px;
}

.link {
  display:block;
  margin-top:15px;
  color:#667eea;
}
</style>
</head>

<body>

<div class="card">
  <h2>📌 เช็คชื่อ</h2>

  <input id="studentId" placeholder="รหัสนักศึกษา">
  <input id="name" placeholder="ชื่อ-นามสกุล">

  <button onclick="sendData()">เช็คชื่อ</button>

  <p id="msg"></p>

  <a href="dashboard.html" class="link">📊 ดูรายชื่อ</a>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxDDCxiSmywAi0kRNAGmN0vq2WWbLWzwHZO-VfchaGZeYbsGXeWIZc3SUJlbzdNsn1s-w/exec";

function sendData(){
  let studentId = document.getElementById("studentId").value.trim();
  let name = document.getElementById("name").value.trim();
  let msg = document.getElementById("msg");

  if(!studentId || !name){
    msg.innerText = "❌ กรุณากรอกให้ครบ";
    msg.style.color = "red";
    return;
  }

  fetch(API_URL, {
    method: "POST",
    body: new URLSearchParams({
      studentId: studentId,
      name: name
    })
  })
  .then(res => res.text())
  .then(() => {
    msg.innerText = "✅ เช็คชื่อสำเร็จ";
    msg.style.color = "green";
  })
  .catch(() => {
    msg.innerText = "❌ เกิดข้อผิดพลาด";
    msg.style.color = "red";
  });
}
</script>

</body>
</html>
