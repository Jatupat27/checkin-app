<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Scan QR</title>

<style>
body {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  font-family:sans-serif;
  text-align:center;
}
.card {
  background:rgba(255,255,255,0.1);
  padding:30px;
  border-radius:20px;
}

</style>

<body>
<div class="card">
  <h2>📱 สแกนเพื่อเช็คชื่อ</h2>

  <p>สแกนแล้วจะไปหน้าเช็คชื่อ</p>

</html>
