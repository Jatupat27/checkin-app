<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Check-in System</title>

  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Prompt', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 20px;
      width: 350px;
      text-align: center;
      color: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 15px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: white;
      color: #764ba2;
      font-weight: bold;
      cursor: pointer;
    }

    #msg {
      margin-top: 15px;
    }

    .success { color: #00ffcc; }
    .error { color: #ff4d4d; }
  </style>
</head>

<body>

<div class="card">
  <h1>📌 เช็คชื่อ</h1>

  <input id="studentId" placeholder="รหัสนักศึกษา">
  <input id="name" placeholder="ชื่อ - นามสกุล">

  <button onclick="sendData()">เช็คชื่อ</button>

  <p id="msg"></p>
</div>

<script>
function sendData() {
  const studentId = document.getElementById("studentId").value;
  const name = document.getElementById("name").value;
  const msg = document.getElementById("msg");

  if (!studentId || !name) {
    msg.innerText = "❌ กรุณากรอกข้อมูลให้ครบ";
    msg.className = "error";
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycbwi1TNFzkm2DwTsAwOUIivv9mvqEDUO0ctxckgfmjw3uJWhuLYhVXn62VwLXvm_AgBH2A/exec", {
    method: "POST",
    body: new URLSearchParams({
      studentId: studentId,
      name: name
    })
  })
  .then(res => res.text())
  .then(() => {
    msg.innerText = "✅ เช็คชื่อสำเร็จ";
    msg.className = "success";
    document.getElementById("studentId").value = "";
    document.getElementById("name").value = "";
  })
  .catch(() => {
    msg.innerText = "❌ เกิดข้อผิดพลาด";
    msg.className = "error";
  });
}
</script>

</body>
</html>
